# MVP «Дело» — только фронтенд (React), без бэкенда
services:
  frontend:
    image: node:20-alpine
    container_name: deloapp-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - deloapp

networks:
  deloapp:
    driver: bridge

volumes:
  frontend_node_modules:
